openapi: 3.1.0
info:
  title: fast-auth
  description: A simple, extensible authentication library for Axum with JWT and refresh tokens
  license:
    name: Apache-2.0
    identifier: Apache-2.0
  version: 0.1.0
paths:
  /auth/api-keys:
    get:
      tags:
      - auth
      summary: List API keys owned by the current user.
      operationId: api_keys_list
      parameters:
      - name: limit
        in: query
        description: Maximum number of items to return.
        required: true
        schema:
          type: integer
          format: int32
          default: 20
          maximum: 100
          minimum: 1
      - name: offset
        in: query
        description: Number of items to skip from the result set.
        required: true
        schema:
          type: integer
          format: int32
          default: 0
          minimum: 0
      - name: sort_by
        in: query
        description: Column used for sorting.
        required: true
        schema:
          $ref: '#/components/schemas/ApiKeyListSortBy'
      - name: sort_order
        in: query
        description: Sort direction.
        required: true
        schema:
          $ref: '#/components/schemas/ListSortOrder'
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListPageResult_ApiKeySummary'
        '400':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '401':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '500':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
      security:
      - sessionCookie: []
      - bearerApiKey: []
    post:
      tags:
      - auth
      summary: Create one API key for the current organization.
      operationId: api_key_create
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiKeyCreateRequest'
        required: true
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyCreateResponse'
        '400':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '401':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '500':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
      security:
      - sessionCookie: []
      - bearerApiKey: []
  /auth/api-keys/{api_key_id}:
    delete:
      tags:
      - auth
      summary: Delete one API key owned by the current user.
      operationId: api_key_delete
      parameters:
      - name: api_key_id
        in: path
        description: API key id
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeySummary'
        '401':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '404':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '500':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
      security:
      - sessionCookie: []
      - bearerApiKey: []
  /auth/email/confirm:
    get:
      tags:
      - auth
      summary: Confirm email from a browser verification link (`GET /auth/email/confirm?token=...`).
      operationId: email_confirm_get
      parameters:
      - name: token
        in: query
        description: Verification token from email link.
        required: true
        schema:
          type: string
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailConfirmResponse'
        '401':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '500':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
  /auth/email/confirm/send:
    post:
      tags:
      - auth
      summary: Send a confirmation email to the user.
      description: |-
        Creates a verification token and sends an email with the confirmation link.
        Always returns success to prevent email enumeration attacks.
      operationId: email_confirm_send
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailConfirmSendRequest'
        required: true
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailConfirmSendResponse'
        '400':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '500':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
  /auth/me:
    get:
      tags:
      - auth
      summary: Get current authenticated user.
      description: |-
        Returns the current user's information from the JWT token.
        Queries the database to get fresh user data including email confirmation state.

        # Requires
        - Valid JWT access token (httpOnly cookie)
        - Expired access tokens must be refreshed explicitly through `POST /auth/refresh`
        - `auth::middleware::base` middleware applied to route
      operationId: me_get
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '404':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '500':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
      security:
      - sessionCookie: []
      - bearerApiKey: []
  /auth/organizations:
    get:
      tags:
      - auth
      operationId: organizations_list
      responses: {}
      security:
      - sessionCookie: []
      - bearerApiKey: []
    post:
      tags:
      - auth
      operationId: organizations_create
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationCreateRequest'
        required: true
      responses: {}
      security:
      - sessionCookie: []
      - bearerApiKey: []
  /auth/organizations/current:
    post:
      tags:
      - auth
      operationId: organizations_switch
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationSwitchRequest'
        required: true
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '404':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '500':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
      security:
      - sessionCookie: []
      - bearerApiKey: []
  /auth/organizations/invites/accept:
    post:
      tags:
      - auth
      operationId: organization_invite_accept
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationInviteAcceptRequest'
        required: true
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '401':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '404':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '500':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
      security:
      - sessionCookie: []
      - bearerApiKey: []
  /auth/organizations/{organization_id}:
    get:
      tags:
      - auth
      operationId: organizations_get
      parameters:
      - name: organization_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses: {}
      security:
      - sessionCookie: []
      - bearerApiKey: []
    delete:
      tags:
      - auth
      operationId: organizations_delete
      parameters:
      - name: organization_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses: {}
      security:
      - sessionCookie: []
      - bearerApiKey: []
    patch:
      tags:
      - auth
      operationId: organizations_update
      parameters:
      - name: organization_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationUpdateRequest'
        required: true
      responses: {}
      security:
      - sessionCookie: []
      - bearerApiKey: []
  /auth/organizations/{organization_id}/invites:
    get:
      tags:
      - auth
      operationId: organization_invites_list
      parameters:
      - name: organization_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses: {}
      security:
      - sessionCookie: []
      - bearerApiKey: []
    post:
      tags:
      - auth
      operationId: organization_invite_create
      parameters:
      - name: organization_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationInviteCreateRequest'
        required: true
      responses: {}
      security:
      - sessionCookie: []
      - bearerApiKey: []
  /auth/organizations/{organization_id}/invites/{invite_id}:
    delete:
      tags:
      - auth
      operationId: organization_invite_revoke
      parameters:
      - name: organization_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: invite_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses: {}
      security:
      - sessionCookie: []
      - bearerApiKey: []
  /auth/organizations/{organization_id}/members:
    get:
      tags:
      - auth
      operationId: organization_members_list
      parameters:
      - name: organization_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses: {}
      security:
      - sessionCookie: []
      - bearerApiKey: []
  /auth/organizations/{organization_id}/members/{member_user_id}:
    delete:
      tags:
      - auth
      operationId: organization_member_delete
      parameters:
      - name: organization_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: member_user_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses: {}
      security:
      - sessionCookie: []
      - bearerApiKey: []
    patch:
      tags:
      - auth
      operationId: organization_member_update
      parameters:
      - name: organization_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: member_user_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationRoleUpdateRequest'
        required: true
      responses: {}
      security:
      - sessionCookie: []
      - bearerApiKey: []
  /auth/password/forgot:
    post:
      tags:
      - auth
      summary: Request a password reset email.
      description: |-
        Creates a reset token and sends an email with the reset link.
        Always returns success to prevent email enumeration attacks.
      operationId: password_forgot
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordForgotRequest'
        required: true
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordForgotResponse'
        '400':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '500':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
  /auth/password/reset:
    post:
      tags:
      - auth
      summary: Reset password using the token from the email.
      operationId: password_reset
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
        required: true
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetResponse'
        '400':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '401':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '500':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
  /auth/refresh:
    post:
      tags:
      - auth
      summary: Refresh the current session using the refresh-token cookie.
      description: |-
        Rotates the refresh token, issues a new access token, and returns the
        refreshed user payload.
      operationId: refresh
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '403':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '500':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
  /auth/sign-in:
    post:
      tags:
      - auth
      summary: Sign in an existing user.
      description: |-
        Authenticates user with email and password.
        Sets access and refresh tokens as httpOnly cookies.
        Returns `EmailNotConfirmed` when `require_email_confirmation` is enabled and the user has not
        confirmed their email.
        Calls the `on_sign_in` hook after successful authentication.
      operationId: sign_in
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignInRequest'
        required: true
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '401':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '403':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '500':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
  /auth/sign-out:
    post:
      tags:
      - auth
      summary: Sign out user by revoking refresh token.
      description: |-
        Revokes the refresh token from database and clears both access and refresh cookies.
        The server automatically sends Set-Cookie headers to clear the cookies from the browser.

        **Note**: Due to the stateless nature of JWT tokens, if the access token was copied before
        sign-out, it will remain valid until it expires (typically 15 minutes). This is standard
        behavior for JWT-based authentication systems.
      operationId: sign_out
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignOutResponse'
        '401':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '500':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
  /auth/sign-up:
    post:
      tags:
      - auth
      summary: Sign up a new user.
      description: |-
        Creates a new user account with email and password.
        When email confirmation is required, it also issues/sends a confirmation email.
        Sets access and refresh tokens as httpOnly cookies unless email confirmation is required.
        Calls the `on_sign_up` hook after successful user creation.
      operationId: sign_up
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignUpRequest'
        required: true
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '409':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '500':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
components:
  schemas:
    ApiKeyCreateRequest:
      type: object
      description: Request body for API key creation.
      required:
      - name
      properties:
        name:
          type: string
          description: User-defined API key name.
    ApiKeyCreateResponse:
      type: object
      description: API key creation response with one-time plaintext key.
      required:
      - id
      - name
      - organization_id
      - key
      - created_by_user_id
      - key_prefix
      - created_at
      properties:
        created_at:
          type: string
          format: date-time
          description: Creation timestamp.
        created_by_user_id:
          type: string
          format: uuid
          description: User id that created the key.
        id:
          type: string
          format: uuid
          description: API key identifier.
        key:
          type: string
          description: Plaintext key returned once.
        key_prefix:
          type: string
          description: Stable visible key prefix.
        last_used_at:
          type:
          - string
          - 'null'
          format: date-time
          description: Last successful use timestamp.
        name:
          type: string
          description: User-defined display name.
        organization_id:
          type: string
          format: uuid
          description: Owning organization id.
    ApiKeyListSortBy:
      type: string
      description: Sortable columns for API-key listing.
      enum:
      - created_at
      - name
      - last_used_at
    ApiKeySummary:
      type: object
      description: API key summary returned by list and delete endpoints.
      required:
      - id
      - name
      - organization_id
      - key_prefix
      - created_by_user_id
      - created_at
      properties:
        created_at:
          type: string
          format: date-time
          description: Creation timestamp.
        created_by_user_id:
          type: string
          format: uuid
          description: User id that created the key.
        id:
          type: string
          format: uuid
          description: API key identifier.
        key_prefix:
          type: string
          description: Stable visible key prefix.
        last_used_at:
          type:
          - string
          - 'null'
          format: date-time
          description: Last successful use timestamp.
        name:
          type: string
          description: User-defined display name.
        organization_id:
          type: string
          format: uuid
          description: Owning organization id.
    AuthErrorResponse:
      type: object
      description: Standard error response body returned by auth endpoints.
      required:
      - error
      properties:
        error:
          type: string
          description: Human-readable error message.
    AuthResponse:
      type: object
      description: Auth response body. Tokens are set as httpOnly cookies.
      required:
      - user
      - organization
      - auth_role
      properties:
        auth_role:
          type: string
        organization:
          $ref: '#/components/schemas/OrganizationResponse'
        user:
          $ref: '#/components/schemas/UserResponse'
    EmailConfirmQuery:
      type: object
      description: Query for browser-based email confirmation links.
      required:
      - token
      properties:
        token:
          type: string
          description: Verification token from email link.
    EmailConfirmResponse:
      type: object
      description: Response for confirming email.
      required:
      - message
      properties:
        message:
          type: string
          description: Success message.
    EmailConfirmSendRequest:
      type: object
      description: Request body for sending confirmation email.
      required:
      - email
      properties:
        email:
          type: string
          description: User's email address.
    EmailConfirmSendResponse:
      type: object
      description: Response for sending confirmation email.
      required:
      - message
      properties:
        message:
          type: string
          description: Success message.
    ListPageResult_ApiKeySummary:
      type: object
      description: Shared page payload metadata plus returned items.
      required:
      - items
      - total
      - limit
      - offset
      properties:
        items:
          type: array
          items:
            type: object
            description: API key summary returned by list and delete endpoints.
            required:
            - id
            - name
            - organization_id
            - key_prefix
            - created_by_user_id
            - created_at
            properties:
              created_at:
                type: string
                format: date-time
                description: Creation timestamp.
              created_by_user_id:
                type: string
                format: uuid
                description: User id that created the key.
              id:
                type: string
                format: uuid
                description: API key identifier.
              key_prefix:
                type: string
                description: Stable visible key prefix.
              last_used_at:
                type:
                - string
                - 'null'
                format: date-time
                description: Last successful use timestamp.
              name:
                type: string
                description: User-defined display name.
              organization_id:
                type: string
                format: uuid
                description: Owning organization id.
          description: Returned page items.
        limit:
          type: integer
          format: int32
          description: Applied page size.
          maximum: 100
          minimum: 1
        offset:
          type: integer
          format: int32
          description: Applied page offset.
          minimum: 0
        total:
          type: integer
          format: int64
          description: Total number of visible rows.
    ListSortOrder:
      type: string
      description: Shared sort direction for list endpoints.
      enum:
      - asc
      - desc
    Organization:
      type: object
      description: |-
        Organization summary exposed by auth.

        This is the storage-agnostic organization shape returned by backend methods
        and exposed by organization endpoints.
      required:
      - id
      - name
      - created_at
      - updated_at
      properties:
        created_at:
          type: string
          format: date-time
          description: Organization creation timestamp.
        id:
          type: string
          format: uuid
          description: Stable organization identifier.
        name:
          type: string
          description: Human-readable organization name.
        updated_at:
          type: string
          format: date-time
          description: Most recent organization update timestamp.
    OrganizationCreateRequest:
      type: object
      description: Organization create request.
      required:
      - name
      properties:
        name:
          type: string
          description: Organization name.
    OrganizationInvite:
      type: object
      description: |-
        Organization invitation metadata.

        This is the persisted invitation state returned by list, revoke, and accept
        flows. The plaintext invite token is intentionally excluded here and is only
        available through [`OrganizationInviteWithSecret`] at creation time.
      required:
      - id
      - organization_id
      - organization_name
      - email
      - role
      - invited_by_user_id
      - created_at
      properties:
        accepted_at:
          type:
          - string
          - 'null'
          format: date-time
          description: Acceptance timestamp, when the invite has been accepted.
        created_at:
          type: string
          format: date-time
          description: Invitation creation timestamp.
        email:
          type: string
          description: Email address the invitation targets.
        id:
          type: string
          format: uuid
          description: Stable invitation identifier.
        invited_by_user_id:
          type: string
          format: uuid
          description: User identifier of the inviter.
        organization_id:
          type: string
          format: uuid
          description: Target organization identifier.
        organization_name:
          type: string
          description: Human-readable target organization name.
        revoked_at:
          type:
          - string
          - 'null'
          format: date-time
          description: Revocation timestamp, when the invite has been revoked.
        role:
          $ref: '#/components/schemas/OrganizationRole'
          description: Role that will be granted if the invite is accepted.
    OrganizationInviteAcceptRequest:
      type: object
      description: Invitation accept request.
      required:
      - token
      properties:
        token:
          type: string
          description: Plaintext invitation token.
    OrganizationInviteCreateRequest:
      type: object
      description: Invitation create request.
      required:
      - email
      - role
      properties:
        email:
          type: string
          description: Invited email.
        role:
          $ref: '#/components/schemas/OrganizationRole'
          description: Invited role.
    OrganizationInviteWithSecret:
      allOf:
      - $ref: '#/components/schemas/OrganizationInvite'
        description: Persisted invitation metadata.
      - type: object
        required:
        - token
        properties:
          token:
            type: string
            description: Plaintext invitation token returned once at creation time.
      description: |-
        Invitation creation result that includes the one-time plaintext token.

        The plaintext `token` is returned only once so callers can deliver it to
        the invited user. Later reads should use [`OrganizationInvite`] instead.
    OrganizationMember:
      type: object
      description: |-
        Organization membership summary exposed by auth.

        Backends return this when listing memberships or members so handlers can
        expose both the organization metadata and the caller-visible membership role
        in one payload.
      required:
      - organization
      - user_id
      - email
      - role
      - created_at
      properties:
        created_at:
          type: string
          format: date-time
          description: Membership creation timestamp.
        email:
          type: string
          description: Member email address.
        organization:
          $ref: '#/components/schemas/Organization'
          description: Organization visible through this membership.
        role:
          $ref: '#/components/schemas/OrganizationRole'
          description: Role granted inside the organization.
        user_id:
          type: string
          format: uuid
          description: Member user identifier.
    OrganizationResponse:
      type: object
      description: Active organization returned in auth responses.
      required:
      - id
      - name
      - role
      properties:
        id:
          type: string
        name:
          type: string
        role:
          $ref: '#/components/schemas/OrganizationRole'
    OrganizationRole:
      type: string
      description: |-
        Organization membership role exposed by auth.

        This role is embedded in [`RequestUser`] and [`HydratedUser`],
        organization membership responses,
        and invitations so backends and HTTP handlers can share one stable
        authorization vocabulary.
      enum:
      - owner
      - admin
      - member
    OrganizationRoleUpdateRequest:
      type: object
      description: Membership role update request.
      required:
      - role
      properties:
        role:
          $ref: '#/components/schemas/OrganizationRole'
          description: New organization role.
    OrganizationSwitchRequest:
      type: object
      description: Active organization switch request.
      required:
      - organization_id
      properties:
        organization_id:
          type: string
          format: uuid
          description: Next active organization id.
    OrganizationUpdateRequest:
      type: object
      description: Organization update request.
      required:
      - name
      properties:
        name:
          type: string
          description: Updated organization name.
    PasswordForgotRequest:
      type: object
      description: Request body for forgot password.
      required:
      - email
      properties:
        email:
          type: string
          description: User's email address.
    PasswordForgotResponse:
      type: object
      description: Response for forgot password.
      required:
      - message
      properties:
        message:
          type: string
          description: Success message.
    PasswordResetRequest:
      type: object
      description: Request body for password reset.
      required:
      - token
      - password
      properties:
        password:
          type: string
          description: New password.
        token:
          type: string
          description: Reset token from email link.
    PasswordResetResponse:
      type: object
      description: Response for password reset.
      required:
      - message
      properties:
        message:
          type: string
          description: Success message.
    SignInRequest:
      type: object
      description: Request body for sign-in.
      required:
      - email
      - password
      properties:
        email:
          type: string
          description: User email address.
        password:
          type: string
          description: User password.
    SignOutResponse:
      type: object
      description: Response for sign-out.
      required:
      - success
      - message
      properties:
        message:
          type: string
          description: Message instructing client to clear tokens.
        success:
          type: boolean
          description: Sign-out success status.
    SignUpRequest:
      type: object
      description: Request body for sign-up.
      required:
      - email
      - password
      properties:
        email:
          type: string
          description: User email address.
        password:
          type: string
          description: User password (min 8 characters, must contain letter and number).
    UserResponse:
      type: object
      description: User data returned in auth responses.
      required:
      - id
      - email
      properties:
        email:
          type: string
        email_confirmed_at:
          type:
          - string
          - 'null'
        id:
          type: string
  securitySchemes:
    bearerApiKey:
      type: apiKey
      in: header
      name: Authorization
    sessionCookie:
      type: apiKey
      in: cookie
      name: access_token
tags:
- name: auth
  description: Authentication management
